  31-link_keycloak.sh: |
    #!/bin/bash

    # i-Parapheur
    # Copyright (C) 2019-2020 Libriciel-SCOP
    #
    # This program is free software: you can redistribute it and/or modify
    # it under the terms of the GNU Affero General Public License as
    # published by the Free Software Foundation, either version 3 of the
    # License, or (at your option) any later version.
    #
    # This program is distributed in the hope that it will be useful,
    # but WITHOUT ANY WARRANTY; without even the implied warranty of
    # MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the
    # GNU Affero General Public License for more details.
    #
    # You should have received a copy of the GNU Affero General Public License
    # along with this program.  If not, see <https://www.gnu.org/licenses/>.

    set -e

    psql -v ON_ERROR_STOP=1 --dbname "ipcore" <<-EOSQL

        DROP SERVER IF EXISTS keycloak CASCADE;

        CREATE SERVER keycloak
          FOREIGN DATA WRAPPER postgres_fdw
          OPTIONS (dbname 'keycloak', host 'postgres', port '5432');

        CREATE USER MAPPING FOR ipcore
          SERVER keycloak
          OPTIONS (user 'keycloak', password 'keycloak');


        CREATE FOREIGN TABLE user_entity(
            id character varying(36) NOT NULL,
            email character varying(255),
            email_constraint character varying(255),
            email_verified boolean DEFAULT false NOT NULL,
            enabled boolean DEFAULT false NOT NULL,
            federation_link character varying(255),
            first_name character varying(255),
            last_name character varying(255),
            realm_id character varying(255),
            username character varying(255)
          )
          SERVER keycloak
          OPTIONS (schema_name 'public', table_name 'user_entity');

        CREATE FOREIGN TABLE user_attribute(
            name VARCHAR(255),
            value VARCHAR(255),
            user_id VARCHAR(36),
            id VARCHAR(36)
          )
          SERVER keycloak
          OPTIONS (schema_name 'public', table_name 'user_attribute');

        CREATE FOREIGN TABLE keycloak_role(
            id VARCHAR(36),
            description VARCHAR(255),
            name VARCHAR(255),
            realm_id VARCHAR(255)
          )
          SERVER keycloak
          OPTIONS (schema_name 'public', table_name 'keycloak_role');

        CREATE FOREIGN TABLE component(
            id character varying(36) NOT NULL,
            parent_id character varying(36),
            provider_id character varying(36),
            provider_type character varying(255),
            realm_id character varying(36),
            sub_type character varying(255)
          )
          SERVER keycloak
          OPTIONS (schema_name 'public', table_name 'component');

        CREATE FOREIGN TABLE component_config (
            id character varying(36) NOT NULL,
            component_id character varying(36) NOT NULL,
            name character varying(255) NOT NULL,
            value character varying(4000)
          )
          SERVER keycloak
          OPTIONS (schema_name 'public', table_name 'component_config');

        CREATE FOREIGN TABLE user_role_mapping (
              role_id character varying(255) NOT NULL,
              user_id character varying(36) NOT NULL
          )
          SERVER keycloak
          OPTIONS (schema_name 'public', table_name 'user_role_mapping');


        ALTER FOREIGN TABLE user_entity OWNER TO ipcore;
        ALTER FOREIGN TABLE keycloak_role OWNER TO ipcore;
        ALTER FOREIGN TABLE user_attribute OWNER TO ipcore;
        ALTER FOREIGN TABLE component OWNER TO ipcore;
        ALTER FOREIGN TABLE component_config OWNER TO ipcore;
        ALTER FOREIGN TABLE user_role_mapping OWNER TO ipcore;

    EOSQL

    echo "Core-Keycloak linked data set"
  32-link_flowable.sh: |
    #!/bin/bash

    # i-Parapheur
    # Copyright (C) 2019-2020 Libriciel-SCOP
    #
    # This program is free software: you can redistribute it and/or modify
    # it under the terms of the GNU Affero General Public License as
    # published by the Free Software Foundation, either version 3 of the
    # License, or (at your option) any later version.
    #
    # This program is distributed in the hope that it will be useful,
    # but WITHOUT ANY WARRANTY; without even the implied warranty of
    # MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the
    # GNU Affero General Public License for more details.
    #
    # You should have received a copy of the GNU Affero General Public License
    # along with this program.  If not, see <https://www.gnu.org/licenses/>.

    set -e

    psql -v ON_ERROR_STOP=1 --dbname "ipcore" <<-EOSQL

        DROP SERVER IF EXISTS flowable CASCADE;

        CREATE SERVER flowable
          FOREIGN DATA WRAPPER postgres_fdw
          OPTIONS (dbname 'flowable', host 'postgres', port '5432');

        CREATE USER MAPPING FOR ipcore
          SERVER flowable
          OPTIONS (user 'flowable', password 'flowable');


        CREATE FOREIGN TABLE act_ru_task(
            id_ VARCHAR(64),
            execution_id_ VARCHAR(64),
            proc_inst_id_ VARCHAR(64),
            name_ VARCHAR(255),
            parent_task_id_ VARCHAR(64),
            owner_ VARCHAR(255),
            assignee_ VARCHAR(255),
            delegation_ VARCHAR(64),
            create_time_ TIMESTAMP,
            due_date_ TIMESTAMP
          )
          SERVER flowable
          OPTIONS (schema_name 'public', table_name 'act_ru_task');

        CREATE FOREIGN TABLE act_ru_identitylink(
            id_ VARCHAR(64),
            group_id_ VARCHAR(255),
            type_ VARCHAR(255),
            task_id_ VARCHAR(255),
            proc_inst_id_ VARCHAR(255)
          )
          SERVER flowable
          OPTIONS (schema_name 'public', table_name 'act_ru_identitylink');

        CREATE FOREIGN TABLE act_ru_execution(
            id_ VARCHAR(64),
            proc_inst_id_ VARCHAR(64),
            business_key_ VARCHAR(255),
            parent_id_ VARCHAR(64),
            super_exec_ VARCHAR(64),
            root_proc_inst_id_ VARCHAR(64),
            is_active_ BOOLEAN,
            name_ VARCHAR(255),
            start_time_ TIMESTAMP,
            start_user_id_ VARCHAR(255)
          )
          SERVER flowable
          OPTIONS (schema_name 'public', table_name 'act_ru_execution');

        CREATE FOREIGN TABLE act_hi_varinst(
            id_ VARCHAR(64),
            proc_inst_id_ VARCHAR(64),
            execution_id_ VARCHAR(64),
            task_id_ VARCHAR(64),
            name_ VARCHAR(255),
            var_type_ VARCHAR(100),
            bytearray_id_ VARCHAR(64),
            double_ DOUBLE PRECISION,
            long_ BIGINT,
            text_ VARCHAR(4000),
            text2_ VARCHAR(4000)
          )
          SERVER flowable
          OPTIONS (schema_name 'public', table_name 'act_hi_varinst');

        CREATE FOREIGN TABLE act_hi_procinst(
            id_ VARCHAR(64),
            proc_inst_id_ VARCHAR(64),
            business_key_ VARCHAR(255),
            proc_def_id_ VARCHAR(64),
            start_time_ TIMESTAMP,
            end_time_ TIMESTAMP,
            duration_ BIGINT,
            super_process_instance_id_ VARCHAR(64),
            delete_reason_ VARCHAR(4000),
            name_ VARCHAR(255)
          )
          SERVER flowable
          OPTIONS (schema_name 'public', table_name 'act_hi_procinst');

        CREATE FOREIGN TABLE act_ru_variable(
            id_ VARCHAR(64),
            type_ VARCHAR(255),
            name_ VARCHAR(255),
            execution_id_ VARCHAR(64),
            proc_inst_id_ VARCHAR(64),
            task_id_ VARCHAR(64),
            var_type_ VARCHAR(100),
            bytearray_id_ VARCHAR(64),
            double_ DOUBLE PRECISION,
            long_ BIGINT,
            text_ VARCHAR(4000),
            text2_ VARCHAR(4000)
          )
          SERVER flowable
          OPTIONS (schema_name 'public', table_name 'act_ru_variable');


        ALTER FOREIGN TABLE act_ru_task OWNER TO ipcore;
        ALTER FOREIGN TABLE act_ru_identitylink OWNER TO ipcore;
        ALTER FOREIGN TABLE act_ru_execution OWNER TO ipcore;
        ALTER FOREIGN TABLE act_ru_variable OWNER TO ipcore;
        ALTER FOREIGN TABLE act_hi_varinst OWNER TO ipcore;
        ALTER FOREIGN TABLE act_hi_procinst OWNER TO ipcore;

    EOSQL

    echo "Core-Flowable linked data set"
  33-init_quartz.sh: |
    #!/bin/bash

    # i-Parapheur
    # Copyright (C) 2019-2020 Libriciel-SCOP
    #
    # This program is free software: you can redistribute it and/or modify
    # it under the terms of the GNU Affero General Public License as
    # published by the Free Software Foundation, either version 3 of the
    # License, or (at your option) any later version.
    #
    # This program is distributed in the hope that it will be useful,
    # but WITHOUT ANY WARRANTY; without even the implied warranty of
    # MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the
    # GNU Affero General Public License for more details.
    #
    # You should have received a copy of the GNU Affero General Public License
    # along with this program.  If not, see <https://www.gnu.org/licenses/>.

    set -e

    psql -v ON_ERROR_STOP=1 --dbname "quartz" <<-EOSQL

        CREATE TABLE qrtz_blob_triggers
        (
            sched_name    character varying(120) NOT NULL,
            trigger_name  character varying(200) NOT NULL,
            trigger_group character varying(200) NOT NULL,
            blob_data     bytea
        );

        CREATE TABLE qrtz_calendars
        (
            sched_name    character varying(120) NOT NULL,
            calendar_name character varying(200) NOT NULL,
            calendar      bytea                  NOT NULL
        );

        CREATE TABLE qrtz_cron_triggers
        (
            sched_name      character varying(120) NOT NULL,
            trigger_name    character varying(200) NOT NULL,
            trigger_group   character varying(200) NOT NULL,
            cron_expression character varying(120) NOT NULL,
            time_zone_id    character varying(80)
        );

        CREATE TABLE qrtz_fired_triggers
        (
            sched_name        character varying(120) NOT NULL,
            entry_id          character varying(95)  NOT NULL,
            trigger_name      character varying(200) NOT NULL,
            trigger_group     character varying(200) NOT NULL,
            instance_name     character varying(200) NOT NULL,
            fired_time        bigint                 NOT NULL,
            sched_time        bigint                 NOT NULL,
            priority          integer                NOT NULL,
            state             character varying(16)  NOT NULL,
            job_name          character varying(200),
            job_group         character varying(200),
            is_nonconcurrent  boolean,
            requests_recovery boolean
        );

        CREATE TABLE qrtz_job_details
        (
            sched_name        character varying(120) NOT NULL,
            job_name          character varying(200) NOT NULL,
            job_group         character varying(200) NOT NULL,
            description       character varying(250),
            job_class_name    character varying(250) NOT NULL,
            is_durable        boolean                NOT NULL,
            is_nonconcurrent  boolean                NOT NULL,
            is_update_data    boolean                NOT NULL,
            requests_recovery boolean                NOT NULL,
            job_data          bytea
        );

        CREATE TABLE qrtz_locks
        (
            sched_name character varying(120) NOT NULL,
            lock_name  character varying(40)  NOT NULL
        );

        CREATE TABLE qrtz_paused_trigger_grps
        (
            sched_name    character varying(120) NOT NULL,
            trigger_group character varying(200) NOT NULL
        );

        CREATE TABLE qrtz_scheduler_state
        (
            sched_name        character varying(120) NOT NULL,
            instance_name     character varying(200) NOT NULL,
            last_checkin_time bigint                 NOT NULL,
            checkin_interval  bigint                 NOT NULL
        );

        CREATE TABLE qrtz_simple_triggers
        (
            sched_name      character varying(120) NOT NULL,
            trigger_name    character varying(200) NOT NULL,
            trigger_group   character varying(200) NOT NULL,
            repeat_count    bigint                 NOT NULL,
            repeat_interval bigint                 NOT NULL,
            times_triggered bigint                 NOT NULL
        );

        CREATE TABLE qrtz_simprop_triggers
        (
            sched_name    character varying(120) NOT NULL,
            trigger_name  character varying(200) NOT NULL,
            trigger_group character varying(200) NOT NULL,
            str_prop_1    character varying(512),
            str_prop_2    character varying(512),
            str_prop_3    character varying(512),
            int_prop_1    integer,
            int_prop_2    integer,
            long_prop_1   bigint,
            long_prop_2   bigint,
            dec_prop_1    numeric(13, 4),
            dec_prop_2    numeric(13, 4),
            bool_prop_1   boolean,
            bool_prop_2   boolean
        );

        CREATE TABLE qrtz_triggers
        (
            sched_name     character varying(120) NOT NULL,
            trigger_name   character varying(200) NOT NULL,
            trigger_group  character varying(200) NOT NULL,
            job_name       character varying(200) NOT NULL,
            job_group      character varying(200) NOT NULL,
            description    character varying(250),
            next_fire_time bigint,
            prev_fire_time bigint,
            priority       integer,
            trigger_state  character varying(16)  NOT NULL,
            trigger_type   character varying(8)   NOT NULL,
            start_time     bigint                 NOT NULL,
            end_time       bigint,
            calendar_name  character varying(200),
            misfire_instr  smallint,
            job_data       bytea
        );

        ALTER TABLE qrtz_blob_triggers OWNER TO quartz;
        ALTER TABLE qrtz_calendars OWNER TO quartz;
        ALTER TABLE qrtz_cron_triggers OWNER TO quartz;
        ALTER TABLE qrtz_fired_triggers OWNER TO quartz;
        ALTER TABLE qrtz_job_details OWNER TO quartz;
        ALTER TABLE qrtz_locks OWNER TO quartz;
        ALTER TABLE qrtz_paused_trigger_grps OWNER TO quartz;
        ALTER TABLE qrtz_scheduler_state OWNER TO quartz;
        ALTER TABLE qrtz_simple_triggers OWNER TO quartz;
        ALTER TABLE qrtz_simprop_triggers OWNER TO quartz;
        ALTER TABLE qrtz_triggers OWNER TO quartz;

        ALTER TABLE ONLY qrtz_blob_triggers
            ADD CONSTRAINT qrtz_blob_triggers_pkey
            PRIMARY KEY (sched_name, trigger_name, trigger_group);

        ALTER TABLE ONLY qrtz_calendars
            ADD CONSTRAINT qrtz_calendars_pkey
            PRIMARY KEY (sched_name, calendar_name);

        ALTER TABLE ONLY qrtz_cron_triggers
            ADD CONSTRAINT qrtz_cron_triggers_pkey
            PRIMARY KEY (sched_name, trigger_name, trigger_group);

        ALTER TABLE ONLY qrtz_fired_triggers
            ADD CONSTRAINT qrtz_fired_triggers_pkey
            PRIMARY KEY (sched_name, entry_id);

        ALTER TABLE ONLY qrtz_job_details
            ADD CONSTRAINT qrtz_job_details_pkey
            PRIMARY KEY (sched_name, job_name, job_group);

        ALTER TABLE ONLY qrtz_locks
            ADD CONSTRAINT qrtz_locks_pkey
            PRIMARY KEY (sched_name, lock_name);

        ALTER TABLE ONLY qrtz_paused_trigger_grps
            ADD CONSTRAINT qrtz_paused_trigger_grps_pkey
            PRIMARY KEY (sched_name, trigger_group);

        ALTER TABLE ONLY qrtz_scheduler_state
            ADD CONSTRAINT qrtz_scheduler_state_pkey
            PRIMARY KEY (sched_name, instance_name);

        ALTER TABLE ONLY qrtz_simple_triggers
            ADD CONSTRAINT qrtz_simple_triggers_pkey
            PRIMARY KEY (sched_name, trigger_name, trigger_group);

        ALTER TABLE ONLY qrtz_simprop_triggers
            ADD CONSTRAINT qrtz_simprop_triggers_pkey
            PRIMARY KEY (sched_name, trigger_name, trigger_group);

        ALTER TABLE ONLY qrtz_triggers
            ADD CONSTRAINT qrtz_triggers_pkey
            PRIMARY KEY (sched_name, trigger_name, trigger_group);

        CREATE INDEX idx_qrtz_ft_inst_job_req_rcvry ON qrtz_fired_triggers USING btree (sched_name, instance_name, requests_recovery);
        CREATE INDEX idx_qrtz_ft_j_g ON qrtz_fired_triggers USING btree (sched_name, job_name, job_group);
        CREATE INDEX idx_qrtz_ft_jg ON qrtz_fired_triggers USING btree (sched_name, job_group);
        CREATE INDEX idx_qrtz_ft_t_g ON qrtz_fired_triggers USING btree (sched_name, trigger_name, trigger_group);
        CREATE INDEX idx_qrtz_ft_tg ON qrtz_fired_triggers USING btree (sched_name, trigger_group);
        CREATE INDEX idx_qrtz_ft_trig_inst_name ON qrtz_fired_triggers USING btree (sched_name, instance_name);
        CREATE INDEX idx_qrtz_j_grp ON qrtz_job_details USING btree (sched_name, job_group);
        CREATE INDEX idx_qrtz_j_req_recovery ON qrtz_job_details USING btree (sched_name, requests_recovery);
        CREATE INDEX idx_qrtz_t_c ON qrtz_triggers USING btree (sched_name, calendar_name);
        CREATE INDEX idx_qrtz_t_g ON qrtz_triggers USING btree (sched_name, trigger_group);
        CREATE INDEX idx_qrtz_t_j ON qrtz_triggers USING btree (sched_name, job_name, job_group);
        CREATE INDEX idx_qrtz_t_jg ON qrtz_triggers USING btree (sched_name, job_group);
        CREATE INDEX idx_qrtz_t_n_g_state ON qrtz_triggers USING btree (sched_name, trigger_group, trigger_state);
        CREATE INDEX idx_qrtz_t_n_state ON qrtz_triggers USING btree (sched_name, trigger_name, trigger_group, trigger_state);
        CREATE INDEX idx_qrtz_t_next_fire_time ON qrtz_triggers USING btree (sched_name, next_fire_time);
        CREATE INDEX idx_qrtz_t_nft_misfire ON qrtz_triggers USING btree (sched_name, misfire_instr, next_fire_time);
        CREATE INDEX idx_qrtz_t_nft_st ON qrtz_triggers USING btree (sched_name, trigger_state, next_fire_time);
        CREATE INDEX idx_qrtz_t_nft_st_misfire ON qrtz_triggers USING btree (sched_name, misfire_instr, next_fire_time, trigger_state);
        CREATE INDEX idx_qrtz_t_nft_st_misfire_grp ON qrtz_triggers USING btree (sched_name, misfire_instr, next_fire_time, trigger_group, trigger_state);
        CREATE INDEX idx_qrtz_t_state ON qrtz_triggers USING btree (sched_name, trigger_state);

        ALTER TABLE ONLY qrtz_blob_triggers
            ADD CONSTRAINT qrtz_blob_triggers_sched_name_fkey
            FOREIGN KEY (sched_name, trigger_name, trigger_group)
            REFERENCES qrtz_triggers (sched_name, trigger_name, trigger_group);

        ALTER TABLE ONLY qrtz_cron_triggers
            ADD CONSTRAINT qrtz_cron_triggers_sched_name_fkey
            FOREIGN KEY (sched_name, trigger_name, trigger_group)
            REFERENCES qrtz_triggers (sched_name, trigger_name, trigger_group);

        ALTER TABLE ONLY qrtz_simple_triggers
            ADD CONSTRAINT qrtz_simple_triggers_sched_name_fkey
            FOREIGN KEY (sched_name, trigger_name, trigger_group)
            REFERENCES qrtz_triggers (sched_name, trigger_name, trigger_group);

        ALTER TABLE ONLY qrtz_simprop_triggers
            ADD CONSTRAINT qrtz_simprop_triggers_sched_name_fkey
            FOREIGN KEY (sched_name, trigger_name, trigger_group)
            REFERENCES qrtz_triggers (sched_name, trigger_name, trigger_group);

        ALTER TABLE ONLY qrtz_triggers
            ADD CONSTRAINT qrtz_triggers_sched_name_fkey
            FOREIGN KEY (sched_name, job_name, job_group)
            REFERENCES qrtz_job_details (sched_name, job_name, job_group);

    EOSQL

    echo "Quartz database initialized"
kind: ConfigMap
metadata:
  name: initdb
