apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: ./kompose convert --out kubernetes
    kompose.version: 1.21.0 (992df58d8)
  creationTimestamp: null
  labels:
    io.kompose.service: alfresco
  name: alfresco
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: alfresco
  strategy:
    type: Recreate
  template:
