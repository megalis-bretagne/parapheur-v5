              name: alfresco-claim2
      restartPolicy: Always
      volumes:
        - name: alfresco-claim0
          persistentVolumeClaim:
            claimName: alfresco-claim0
        - name: alfresco-claim1
          persistentVolumeClaim:
            claimName: alfresco-claim1
        - name: alfresco-claim2
          persistentVolumeClaim:
            claimName: alfresco-claim2
