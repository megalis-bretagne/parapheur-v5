        - env:
            - name: JAVA_OPTS
              value: " -XX:+UseContainerSupport -Ddeployment.method=DOCKER_COMPOSE\n-Ddb.driver=org.postgresql.Driver -Ddb.username=alfresco -Ddb.password=alfresco -Ddb.url=jdbc:postgresql://postgres:5432/alfresco -Dalfresco.host=alfresco -Dalfresco.port=8080 -Dalf.root=/var/lib/alfresco\n-Dsolr.host=solr6 -Dsolr.port=8983 -Dsolr.secureComms=none -Dsolr.base.url=/solr -Dindex.subsystem.name=solr6\n-Dheartbeat.enabled=false -Dtransform.service.enabled=false -Dlocal.transform.service.enabled=false -Dlegacy.transform.service.enabled=false -Dmessaging.subsystem.autoStart=false -Dsystem.workflow.engine.activiti.enabled=false "
          image: alfresco/alfresco-content-repository-community:6.2.0-ga
          name: alfresco
          resources:
            limits:
              memory: "1610612736"
          tty: true
          volumeMounts:
            - mountPath: /usr/local/tomcat/alf_data
