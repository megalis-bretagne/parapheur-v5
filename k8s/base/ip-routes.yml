apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: core
  namespace: iparapheur
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: PathPrefix(`/api/v1`)
      priority: 1000 #To overcome traefik priority. see https://doc.traefik.io/traefik/routing/routers/#priority
      services:
        - name: core
          port: 8080

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: matomo
  namespace: iparapheur
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: PathPrefix(`/matomo`)
      middlewares:
        - name: stripprefix
      services:
        - name: matomo
          port: 80


---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: keycloak
  namespace: iparapheur
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: PathPrefix(`/auth`)
      services:
        - name: keycloak
          port: 8080

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: web-client
  namespace: iparapheur
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: PathPrefix(`/`)
      services:
        - name: web-client
          port: 80

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: stripprefix
  namespace: iparapheur
spec:
  stripPrefix:
    prefixes:
      - /matomo

