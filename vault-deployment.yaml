apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: iparapheur
  labels:
    app: vault
spec:
  selector:
    app: vault
  ports:
    - port: 8200

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vault
  name: vault
  namespace: iparapheur
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: vault:1.6.2
          args:
            - vault
            - server
            - -config=/vault/config/vault.json
          env:
            - name: VAULT_ADDR
              value: http://0.0.0.0:8200
            - name: VAULT_API_ADDR
              value: http://0.0.0.0:8200
          resources: { }
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          tty: true
          volumeMounts:
            - mountPath: /vault/config
              name: vault-config
            - mountPath: /vault/policies
              name: vault-policies
            - mountPath: /vault/data
              name: vault-data
      restartPolicy: Always
      imagePullSecrets:
        - name: regcred
      volumes:
        - name: vault-config
          hostPath:
            path: /home/marc/dev/i-Parapheur-v5/compose/src/main/resources/vault/config
            type: DirectoryOrCreate
        - name: vault-policies
          hostPath:
            path: /home/marc/dev/i-Parapheur-v5/compose/src/main/resources/vault/policies
            type: DirectoryOrCreate
        - name: vault-data
          hostPath:
            path: /home/marc/dev/i-Parapheur-v5/compose/data/vault/data
            type: DirectoryOrCreate
status: { }
