apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: crypto
  name: crypto
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: crypto
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: crypto
    spec:
      containers:
        - image: gitlab.libriciel.fr:4567/libriciel/pole-signature/i-parapheur-v5/ip-crypto:2.1.0
          name: crypto
          resources:
            limits:
              memory: "268435456"
          tty: true
          volumeMounts:
            - mountPath: /sentry.properties
              name: crypto-claim0
      restartPolicy: Always
      imagePullSecrets:
        - name: regcred
      volumes:
        - name: crypto-claim0
          persistentVolumeClaim:
            claimName: crypto-claim0
status: { }

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: crypto-claim0
  name: crypto-claim0
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
status: { }

