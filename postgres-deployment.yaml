apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: postgres
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: postgres
    spec:
      containers:
        - args:
            - postgres
            - -c
            - max_connections=500
            - -c
            - log_min_messages=LOG
          env:
            - name: DB_TO_CREATE
              value: alfresco,flowable,keycloak,ipcore,quartz,pastellconnector
            - name: POSTGRES_PASSWORD
            - name: POSTGRES_USER
          image: postgres:10.1
          name: postgres
          resources:
            limits:
              memory: "536870912"
          tty: true
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-data
            - mountPath: /docker-entrypoint-initdb.d
              name: postgres-entrypoint
      restartPolicy: Always
      volumes:
        - name: postgres-data
          hostPath:
            path: /home/marc/dev/i-Parapheur-v5/compose/data/postgres
            type: DirectoryOrCreate
        - name: postgres-entrypoint
          hostPath:
            path: /home/marc/dev/i-Parapheur-v5/compose/src/main/resources/postgres/docker-entrypoint-initdb.d
            type: DirectoryOrCreate
status: { }
