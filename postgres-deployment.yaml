apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432

---
kind: Deployment
apiVersion: apps/v1
metadata:
  labels:
    io.kompose.service: postgres
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - args:
            - postgres
            - -c
            - max_connections=500
            - -c
            - log_min_messages=LOG
          env:
            - name: POSTGRES_USER
              value: root
            - name: POSTGRES_PASSWORD
              value: libriciel2k18
            - name: DB_TO_CREATE
              value: alfresco,flowable,keycloak,ipcore,quartz,pastellconnector
          image: postgres:10.1
          name: postgres
          ports:
            - containerPort: 5432
          resources:
            limits:
              memory: "536870912"
          tty: true
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-data
            - mountPath: /docker-entrypoint-initdb.d
              name: postgres-entrypoint
      restartPolicy: Always
      volumes:
        - name: postgres-data
          hostPath:
            path: /home/marc/dev/i-Parapheur-v5/compose/data/postgres
            type: DirectoryOrCreate
        - name: postgres-entrypoint
          hostPath:
            path: /home/marc/dev/i-Parapheur-v5/compose/src/main/resources/postgres/docker-entrypoint-initdb.d
            type: DirectoryOrCreate
status: { }
