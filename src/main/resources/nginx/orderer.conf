server {
    listen 80 http2;
    server_name orderer.blucas-ovh.iparapheur.dev.libriciel.net;

#    location / {
#        proxy_pass http://localhost:8998;
#    }

    ssl_certificate /etc/nginx/ssl/orderer/server.crt;
    ssl_certificate_key /etc/nginx/ssl/orderer/server.key;


    location / {
        # Replace localhost:50051 with the address and port of your gRPC server
        # The 'grpc://' prefix is optional; unencrypted gRPC is the default
        grpc_pass grpc://0.0.0.0:17050;
    }
}


