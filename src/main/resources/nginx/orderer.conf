server {
    listen 443 ssl http2;
    server_name orderer.blucas-ovh.iparapheur.dev.libriciel.net;

    ssl_certificate /etc/nginx/ssl/orderer/server.crt;
    ssl_certificate_key /etc/nginx/ssl/orderer/server.key;

    #ssl_verify_client optional;

    grpc_ssl_certificate /etc/nginx/ssl/orderer/server.crt;
    grpc_ssl_certificate_key /etc/nginx/ssl/orderer/server.key;



    # debug log file
    error_log /var/log/nginx/error-debug-peer.log debug;

    # to allow chunked size > 1MB
    client_max_body_size 50M;


    location / {
        #grpc_pass_header Date
        grpc_pass grpcs://host.docker.internal:7050;
    }
}
